<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SCUM Supply Co.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        * {
            font-family: 'Inter', system-ui, sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #020817;
            color: white;
            min-height: 100vh;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0)
            }
            50% {
                transform: translateY(-8px)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%)
            }
            to {
                transform: translateX(0)
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1
            }
            50% {
                opacity: .4
            }
        }

        .animate-float {
            animation: float 5s ease-in-out infinite;
        }

        .animate-fade-in {
            animation: fadeIn .25s ease forwards;
        }

        .animate-slide-in {
            animation: slideIn .3s ease forwards;
        }

        .animate-pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #6d28d9;
            border-radius: 4px;
        }

        select option {
            background: #1e293b;
            color: white;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const {useState, useEffect, useRef} = React;
    const {createClient} = supabase;

    // ─── Supabase ──────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://ajcejvhkbgchxbvbyhfu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_5yRi8k96nryADPvgZWecJA_5Xt_Zh3Y';
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ─── Constants ─────────────────────────────────────────────────────────
    const CAT_EMOJI = {armas: '🔫', municao: '🔶', recursos: '📦', equipamentos: '🎒', medicamentos: '💊', outros: '⚙️'};
    const CAT_GRAD = {
        armas: 'from-red-600 to-orange-500',
        municao: 'from-yellow-500 to-amber-400',
        recursos: 'from-blue-600 to-cyan-500',
        equipamentos: 'from-violet-600 to-purple-500',
        medicamentos: 'from-emerald-600 to-green-400',
        outros: 'from-slate-500 to-slate-400'
    };
    const getGrad = s => CAT_GRAD[s] || 'from-violet-600 to-fuchsia-500';
    const getEmoji = s => CAT_EMOJI[s] || '⚙️';

    const STATUS = {
        pending: {label: 'Pendente', cls: 'text-yellow-400 bg-yellow-400/10 border-yellow-400/25'},
        confirmed: {label: 'Confirmado', cls: 'text-blue-400 bg-blue-400/10 border-blue-400/25'},
        delivered: {label: 'Entregue', cls: 'text-emerald-400 bg-emerald-400/10 border-emerald-400/25'},
        cancelled: {label: 'Cancelado', cls: 'text-red-400 bg-red-400/10 border-red-400/25'},
    };

    // ─── Input helper ──────────────────────────────────────────────────────
    const Input = ({label, ...props}) => (
        <div>
            {label && <label className="block text-xs text-slate-400 mb-1">{label}</label>}
            <input {...props}
                   className="w-full px-3 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:border-violet-500 transition-colors"/>
        </div>
    );

    // ─── ItemCard ──────────────────────────────────────────────────────────
    function ItemCard({item, onAdd, cartItem}) {
        const slug = item.categories?.slug || 'outros';
        const qty = cartItem?.quantity || 0;
        const oos = item.stock <= 0;
        return (
            <div
                className="group flex flex-col rounded-2xl bg-slate-900/50 border border-slate-800/60 hover:border-violet-500/40 hover:bg-slate-900 transition-all duration-300 overflow-hidden">
                {/* Thumbnail */}
                <div
                    className={`relative h-40 bg-gradient-to-br ${getGrad(slug)} flex items-center justify-center overflow-hidden`}>
                    {item.image_url
                        ? <img src={item.image_url} alt={item.name} className="w-full h-full object-cover"/>
                        : <span
                            className="text-6xl opacity-50 group-hover:scale-110 transition-transform duration-300">{getEmoji(slug)}</span>
                    }
                    <span className="absolute top-2 left-2 text-xs px-2 py-1 rounded-lg font-medium"
                          style={{background: 'rgba(0,0,0,.45)', backdropFilter: 'blur(4px)'}}>
              {item.categories?.name || 'Item'}
            </span>
                    {oos
                        ? <span
                            className="absolute top-2 right-2 text-xs px-2 py-1 rounded-lg bg-red-500/80 font-medium">Esgotado</span>
                        : item.stock <= 5
                            ? <span
                                className="absolute top-2 right-2 text-xs px-2 py-1 rounded-lg bg-amber-500/80 font-medium">Últimas {item.stock}</span>
                            : null
                    }
                </div>
                {/* Body */}
                <div className="flex flex-col flex-1 p-4 gap-3">
                    <div>
                        <h3 className="font-semibold text-sm leading-snug mb-1">{item.name}</h3>
                        {item.description &&
                            <p className="text-xs text-slate-500 leading-relaxed line-clamp-2">{item.description}</p>}
                    </div>
                    <div className="flex items-end justify-between mt-auto">
                        <div>
                            <span
                                className="text-xl font-bold text-violet-400">{item.price.toLocaleString('pt-BR')}</span>
                            <span className="text-xs text-slate-600 ml-1">Cash</span>
                        </div>
                        <span className="text-xs text-slate-700">Estoque: {item.stock}</span>
                    </div>
                    {oos ? (
                        <button disabled
                                className="w-full py-2.5 rounded-xl text-sm bg-slate-800/60 text-slate-600 cursor-not-allowed">Indisponível</button>
                    ) : qty === 0 ? (
                        <button onClick={() => onAdd(item)}
                                className="w-full py-2.5 rounded-xl text-sm font-medium transition-all" style={{
                            background: 'rgba(139,92,246,.15)',
                            border: '1px solid rgba(139,92,246,.3)',
                            color: '#c4b5fd'
                        }}>
                            + Adicionar
                        </button>
                    ) : (
                        <div className="w-full py-2.5 rounded-xl text-sm text-center" style={{
                            background: 'rgba(139,92,246,.1)',
                            border: '1px solid rgba(139,92,246,.2)',
                            color: '#a78bfa'
                        }}>
                            ✓ {qty} no carrinho
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ─── CartDrawer ────────────────────────────────────────────────────────
    function CartDrawer({cart, total, onClose, onRemove, onQty, onCheckout}) {
        return (
            <div style={{position: 'fixed', inset: 0, zIndex: 60, display: 'flex', justifyContent: 'flex-end'}}>
                <div
                    style={{position: 'absolute', inset: 0, background: 'rgba(0,0,0,.65)', backdropFilter: 'blur(4px)'}}
                    onClick={onClose}/>
                <div className="animate-slide-in relative flex flex-col w-full max-w-md border-l border-slate-800"
                     style={{background: '#020817'}}>
                    <div className="flex items-center justify-between px-6 py-5 border-b border-slate-800">
                        <h2 className="text-lg font-bold">🛒 Carrinho</h2>
                        <button onClick={onClose}
                                className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all">✕
                        </button>
                    </div>
                    <div className="flex-1 overflow-y-auto px-6 py-4 space-y-3">
                        {cart.length === 0
                            ? <div className="flex flex-col items-center justify-center h-48 text-slate-600"><span
                                className="text-5xl mb-3">🛒</span><p>Carrinho vazio</p></div>
                            : cart.map(({item, quantity}) => (
                                <div key={item.id}
                                     className="flex items-center gap-3 p-3 rounded-xl bg-slate-900 border border-slate-800">
                                    <div
                                        className={`w-10 h-10 rounded-lg bg-gradient-to-br ${getGrad(item.categories?.slug)} flex items-center justify-center text-base flex-shrink-0`}>
                                        {getEmoji(item.categories?.slug)}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <p className="text-sm font-medium truncate">{item.name}</p>
                                        <p className="text-xs text-violet-400">{(item.price * quantity).toLocaleString('pt-BR')} Cashs</p>
                                    </div>
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => onQty(item.id, quantity - 1)}
                                                className="w-6 h-6 rounded bg-slate-700 hover:bg-slate-600 text-xs flex items-center justify-center transition-colors">−
                                        </button>
                                        <span className="w-6 text-center text-sm font-mono">{quantity}</span>
                                        <button onClick={() => onQty(item.id, Math.min(quantity + 1, item.stock))}
                                                className="w-6 h-6 rounded bg-slate-700 hover:bg-slate-600 text-xs flex items-center justify-center transition-colors">+
                                        </button>
                                    </div>
                                    <button onClick={() => onRemove(item.id)}
                                            className="text-slate-700 hover:text-red-400 transition-colors ml-1 text-sm">✕
                                    </button>
                                </div>
                            ))
                        }
                    </div>
                    {cart.length > 0 && (
                        <div className="px-6 py-5 border-t border-slate-800 space-y-4">
                            <div className="flex justify-between items-center">
                                <span className="text-slate-400 text-sm">Total do pedido</span>
                                <span className="text-2xl font-bold text-violet-400">{total.toLocaleString('pt-BR')}
                                    <span className="text-sm text-slate-500"> Cashs</span></span>
                            </div>
                            <button onClick={onCheckout}
                                    className="w-full py-3.5 rounded-xl font-semibold text-sm transition-opacity hover:opacity-90"
                                    style={{background: 'linear-gradient(135deg,#8b5cf6,#d946ef)'}}>
                                Finalizar Pedido →
                            </button>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ─── CheckoutModal ─────────────────────────────────────────────────────
    function CheckoutModal({cart, total, onClose, onSuccess, reloadCatalog}) {
        const [form, setForm] = useState({player_name: '', discord: '', chest_password: ''});
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState('');

        const set = (k, v) => setForm(f => ({...f, [k]: v}));

        const submit = async () => {
            if (!form.player_name.trim() || !form.discord.trim() || !form.chest_password.trim()) {
                setError('Preencha todos os campos obrigatórios.');
                return;
            }
            setLoading(true);
            setError('');
            try {
                const num = 'SCM-' + Date.now().toString().slice(-6);
                const {data: order, error: oErr} = await db.from('orders').insert({
                    order_number: num,
                    player_name: form.player_name.trim(),
                    discord: form.discord.trim(),
                    chest_password: form.chest_password.trim(),
                    total_price: total,
                    status: 'pending'
                }).select().single();

                if (oErr) throw oErr;


                const {error: iErr} = await db.from('order_items').insert(
                    cart.map(({item, quantity}) => ({
                        order_id: order.id,
                        item_id: item.id,
                        item_name: item.name,
                        item_price: item.price,
                        quantity
                    }))
                );

                if (iErr) throw iErr;

                // ↓↓↓ DESCONTAR ESTOQUE ↓↓↓
                for (const {item, quantity} of cart) {
                    const novoEstoque = Math.max(0, item.stock - quantity);

                    const {error: stockErr} = await db
                        .from('items')
                        .update({stock: novoEstoque})
                        .eq('id', item.id);

                    if (stockErr) throw stockErr;
                }

                // RECARREGA CATÁLOGO
                await reloadCatalog();

                onSuccess(order);
            } catch (e) {
                setError('Erro ao registrar pedido. Tente novamente.');
                console.error(e);
            } finally {
                setLoading(false);
            }
        };

        return (
            <div style={{
                position: 'fixed',
                inset: 0,
                zIndex: 70,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                padding: '16px'
            }}>
                <div
                    style={{position: 'absolute', inset: 0, background: 'rgba(0,0,0,.75)', backdropFilter: 'blur(6px)'}}
                    onClick={onClose}/>
                <div
                    className="animate-fade-in relative w-full max-w-lg rounded-3xl overflow-hidden border border-slate-700"
                    style={{background: '#0f172a', maxHeight: '90vh', display: 'flex', flexDirection: 'column'}}>
                    {/* Header */}
                    <div className="px-6 py-5 border-b border-slate-700/60 flex-shrink-0"
                         style={{background: 'linear-gradient(135deg,rgba(139,92,246,.15),rgba(217,70,239,.1))'}}>
                        <div className="flex items-center justify-between">
                            <div>
                                <p className="font-bold text-base tracking-widest">⚡ SCUM SUPPLY CO.</p>
                                <p className="text-xs text-violet-400 mt-0.5 font-mono">PROTOCOLO DE LIBERAÇÃO DE
                                    PEDIDO</p>
                            </div>
                            <button onClick={onClose} className="text-slate-500 hover:text-white transition-colors">✕
                            </button>
                        </div>
                    </div>
                    {/* Scrollable content */}
                    <div className="overflow-y-auto flex-1 px-6 py-5 space-y-4">
                        {/* Protocol */}
                        <div className="p-4 rounded-2xl border border-slate-700/60 text-sm leading-relaxed space-y-3"
                             style={{background: 'rgba(15,23,42,.8)'}}>
                            <p className="text-slate-300">Agradecemos pela preferência. Seu pedido será registrado em
                                nosso sistema de suprimentos. Para darmos início à logística de envio, siga o protocolo
                                de segurança abaixo:</p>
                            <div className="space-y-2.5 text-slate-400">
                                <p><span className="text-violet-400 font-semibold">1 — Depósito:</span> Solicita-se o
                                    depósito do valor total da fatura (em moedas do jogo) no baú designado no perímetro
                                    da sua base.</p>
                                <p><span className="text-violet-400 font-semibold">2 — Entrega:</span> Nossa equipe de
                                    campo providenciará o abastecimento dos itens solicitados diretamente no local
                                    combinado.</p>
                                <p><span className="text-violet-400 font-semibold">3 — Coleta:</span> A retirada do
                                    pagamento será realizada simultaneamente no ato da entrega fazendo uso da senha
                                    informada abaixo. Se a senha estiver errada, não será possível realizar a entrega
                                    nem a coleta do pagamento.</p>
                            </div>
                            <p className="text-xs text-slate-600 italic">Nota: Mantenha o perímetro seguro até a chegada
                                do nosso entregador.</p>
                        </div>
                        {/* Summary */}
                        <div className="p-4 rounded-2xl border border-slate-700/60"
                             style={{background: 'rgba(15,23,42,.6)'}}>
                            <p className="text-xs text-slate-500 mb-3 font-semibold uppercase tracking-wider">Resumo do
                                Pedido</p>
                            <div className="space-y-1.5">
                                {cart.map(({item, quantity}) => (
                                    <div key={item.id} className="flex justify-between text-sm">
                                        <span className="text-slate-400">{quantity} × {item.name}</span>
                                        <span
                                            className="text-violet-400 font-medium">{(item.price * quantity).toLocaleString('pt-BR')} Cashs</span>
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-between font-bold text-sm mt-3 pt-3 border-t border-slate-700">
                                <span>Total</span>
                                <span className="text-violet-400 text-base">{total.toLocaleString('pt-BR')} Cashs</span>
                            </div>
                        </div>
                        {/* Form */}
                        <div className="space-y-3">
                            <Input label="Nome no jogo *" placeholder="Seu nome de personagem" value={form.player_name}
                                   onChange={e => set('player_name', e.target.value)}/>
                            <Input label="Discord *" placeholder="usuario ou @usuario" value={form.discord}
                                   onChange={e => set('discord', e.target.value)}/>
                            <Input label="Senha do baú para entrega*"
                                   placeholder="Senha configurada no baú de pagamento" value={form.chest_password}
                                   onChange={e => set('chest_password', e.target.value)}/>
                        </div>
                        {error && <p className="text-red-400 text-xs text-center py-1">{error}</p>}
                        <button onClick={submit} disabled={loading}
                                className="w-full py-4 rounded-2xl font-bold text-base transition-opacity hover:opacity-90 disabled:opacity-40"
                                style={{background: 'linear-gradient(135deg,#8b5cf6,#d946ef)'}}>
                            {loading ? 'Registrando pedido...' : '✓ Confirmar Pedido'}
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    // ─── OrderSuccessModal ─────────────────────────────────────────────────
    function OrderSuccessModal({order, onClose}) {
        return (
            <div style={{
                position: 'fixed',
                inset: 0,
                zIndex: 80,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                padding: '16px'
            }}>
                <div style={{
                    position: 'absolute',
                    inset: 0,
                    background: 'rgba(0,0,0,.75)',
                    backdropFilter: 'blur(6px)'
                }}/>
                <div
                    className="animate-fade-in relative w-full max-w-sm rounded-3xl border border-emerald-500/30 p-8 text-center"
                    style={{background: '#0f172a'}}>
                    <div className="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl"
                         style={{background: 'rgba(16,185,129,.1)', border: '1px solid rgba(16,185,129,.3)'}}>✓
                    </div>
                    <h2 className="text-xl font-bold mb-2">Pedido Registrado!</h2>
                    <p className="text-slate-400 text-sm mb-6 leading-relaxed">Seu pedido foi recebido. Entraremos em
                        contato pelo Discord para confirmar a entrega.</p>
                    <div className="p-4 rounded-2xl border border-slate-700 mb-6 text-left space-y-2.5"
                         style={{background: 'rgba(15,23,42,.8)'}}>
                        {[
                            {l: 'Nº do pedido', v: order.order_number, hi: true},
                            {l: 'Total', v: `${order.total_price.toLocaleString('pt-BR')} Cashs`, hi: true},
                            {l: 'Status', v: 'Aguardando confirmação', hi: false},
                        ].map(({l, v, hi}) => (
                            <div key={l} className="flex justify-between items-center text-sm">
                                <span className="text-slate-500">{l}</span>
                                <span
                                    className={hi ? 'text-violet-400 font-bold font-mono' : 'text-yellow-400'}>{v}</span>
                            </div>
                        ))}
                    </div>
                    <button onClick={onClose}
                            className="w-full py-3 rounded-xl text-sm bg-slate-800 border border-slate-700 hover:bg-slate-700 transition-colors">Fechar
                    </button>
                </div>
            </div>
        );
    }

    // ─── AdminLogin ────────────────────────────────────────────────────────
    function AdminLogin({onLogin}) {
        const [email, setEmail] = useState('');
        const [pass, setPass] = useState('');
        const [load, setLoad] = useState(false);
        const [err, setErr] = useState('');

        const login = async () => {
            if (!email || !pass) {
                setErr('Preencha os campos.');
                return;
            }
            setLoad(true);
            setErr('');
            const {error} = await db.auth.signInWithPassword({email, password: pass});
            if (error) {
                setErr('Credenciais inválidas.');
                setLoad(false);
            } else onLogin();
        };

        return (
            <div style={{
                minHeight: '100vh',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                background: '#020817',
                padding: '16px'
            }}>
                <div style={{
                    position: 'absolute',
                    top: 0,
                    left: '50%',
                    transform: 'translateX(-50%)',
                    width: '500px',
                    height: '400px',
                    background: 'radial-gradient(ellipse,rgba(139,92,246,.1) 0%,transparent 70%)',
                    pointerEvents: 'none'
                }}/>
                <div className="relative w-full max-w-sm rounded-2xl p-8 border border-slate-800"
                     style={{background: '#0f172a'}}>
                    <div className="text-center mb-8">
                        <div
                            className="w-14 h-14 rounded-2xl flex items-center justify-center font-bold text-xl mx-auto mb-4"
                            style={{background: 'linear-gradient(135deg,#8b5cf6,#d946ef)'}}>SC
                        </div>
                        <h1 className="text-xl font-bold">Painel Admin</h1>
                        <p className="text-sm text-slate-500 mt-1">SCUM Supply Co.</p>
                    </div>
                    <div className="space-y-4">
                        <Input placeholder="E-mail" type="email" value={email} onChange={e => setEmail(e.target.value)}
                               onKeyDown={e => e.key === 'Enter' && login()}/>
                        <Input placeholder="Senha" type="password" value={pass} onChange={e => setPass(e.target.value)}
                               onKeyDown={e => e.key === 'Enter' && login()}/>
                        {err && <p className="text-red-400 text-xs text-center">{err}</p>}
                        <button onClick={login} disabled={load}
                                className="w-full py-3 rounded-xl font-semibold text-sm transition-opacity hover:opacity-90 disabled:opacity-40"
                                style={{background: 'linear-gradient(135deg,#8b5cf6,#d946ef)'}}>
                            {load ? 'Entrando...' : 'Entrar'}
                        </button>
                    </div>
                    <div className="mt-6 text-center">
                        <a href="#" onClick={e => {
                            e.preventDefault();
                            window.location.hash = '';
                        }} className="text-xs text-slate-700 hover:text-slate-400 transition-colors">← Voltar ao
                            catálogo</a>
                    </div>
                </div>
            </div>
        );
    }

    // ─── OrdersTab ─────────────────────────────────────────────────────────
    function OrdersTab({ orders, setOrders, reloadItems}){
        const [selected, setSelected] = useState(null);
        const [ois, setOis] = useState([]);
        const [loading, setLoading] = useState(false);

        const pick = async (order) => {
            setSelected(order);
            setLoading(true);
            const {data} = await db.from('order_items').select('*').eq('order_id', order.id).order('item_name');
            setOis(data || []);
            setLoading(false);
        };

        const changeStatus = async (id, status) => {

            // Busca pedido atual
            const currentOrder = orders.find(o => o.id === id);

            // Evita cancelar duas vezes
            if (currentOrder?.status === 'cancelled') {
                return;
            }

            // Evita que um pedido que já foi feita entrega seja cancelado.
            if (currentOrder.status === 'delivered') return;

            // Se estiver cancelando
            if (status === 'cancelled') {

                // Busca itens do pedido
                const { data: orderItems, error: itemsError } = await db
                    .from('order_items')
                    .select('*')
                    .eq('order_id', id);

                if (itemsError) {
                    console.error(itemsError);
                    return;
                }

                // Devolve estoque
                for (const oi of orderItems) {

                    // Busca item atual
                    const { data: itemData, error: itemError } = await db
                        .from('items')
                        .select('stock')
                        .eq('id', oi.item_id)
                        .single();

                    if (itemError) {
                        console.error(itemError);
                        continue;
                    }

                    // Atualiza estoque
                    await db
                        .from('items')
                        .update({
                            stock: itemData.stock + oi.quantity
                        })
                        .eq('id', oi.item_id);

                    // RECARREGA TABELA DE PRODUTOS
                    await reloadItems();
                }
            }

            // Atualiza status
            const { data, error } = await db
                .from('orders')
                .update({ status })
                .eq('id', id)
                .select()
                .single();

            if (error) {
                console.error(error);
                return;
            }

            // Atualiza tabela
            setOrders(prev =>
                prev.map(o =>
                    o.id === id ? data : o
                )
            );

            // Atualiza modal
            setSelected(data);
        };

        const saveAdminNote = async () => {

            if (!selected) return;

            const { error } = await db
                .from('orders')
                .update({
                    admin_note: selected.admin_note
                })
                .eq('id', selected.id);

            if (error) {
                console.error(error);
                return;
            }

            setOrders(prev =>
                prev.map(o =>
                    o.id === selected.id
                        ? { ...o, admin_note: selected.admin_note }
                        : o
                )
            );
        };

        const NEXT = {
            pending: ['confirmed', 'cancelled'],
            confirmed: ['delivered', 'cancelled'],
            delivered: [],
            cancelled: []
        };
        const BTN = {
            confirmed: {l: 'Confirmar', c: 'bg-blue-500 hover:bg-blue-600'},

        return (

                            </tr>
                            </thead>

                            <tbody>
                            {orders.map(o => {

                                return (
                                    <tr

                                        className={`border-b border-slate-800/60 cursor-pointer transition-all hover:bg-slate-800/40 ${
                                            selected?.id === o.id

                                    >
                                        <td className="px-4 py-4 font-mono font-bold text-violet-400">
                                            {o.order_number}
                                        </td>

                                        <td className="px-4 py-4 font-medium">
                                            {o.player_name}
                                        </td>

                                        <td className="px-4 py-4 text-slate-400">
                                            {o.discord}
                                        </td>

                                        <td className="px-4 py-4 font-semibold text-violet-300">
                                            {o.total_price.toLocaleString('pt-BR')} Cashs
                                        </td>

                                        <td className="px-4 py-4">

                {/* Detail */}

    // ─── ItemFormModal ─────────────────────────────────────────────────────
    function ItemFormModal({item, categories, onClose, onSave}) {
        const [form, setForm] = useState({
            name: item?.name || '',
            description: item?.description || '',
            price: item?.price || '',
            stock: item?.stock || '',
            category_id: item?.category_id || '',
            image_url: item?.image_url || '',
            available: item?.available ?? true,
            npc_price: item?.npc_price || ''
        });

        const [imageFile, setImageFile] = useState(null);

        const [load, setLoad] = useState(false);
        const [err, setErr] = useState('');
        const set = (k, v) => setForm(f => ({...f, [k]: v}));

        const save = async () => {
            if (!form.name.trim() || !form.price || !form.category_id) {
                setErr('Nome, preço e categoria são obrigatórios.');
                return;
            }
            setLoad(true);
            let imageUrl = form.image_url;

            if (imageFile) {
                const fileExt = imageFile.name.split('.').pop();

                const fileName = `${crypto.randomUUID()}.${fileExt}`;

                const { error: uploadError } = await db.storage
                    .from('item-images')
                    .upload(fileName, imageFile, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (uploadError) {
                    console.error(uploadError);
                    setErr(uploadError.message);
                    setLoad(false);
                    return;
                }

                const { data } = db.storage
                    .from('item-images')
                    .getPublicUrl(fileName);

                imageUrl = data.publicUrl;
            }

            const payload = {
                name: form.name.trim(),
                description: form.description.trim() || null,
                price: parseInt(form.price) || 0,
                stock: parseInt(form.stock) || 0,
                category_id: form.category_id,
                image_url: imageUrl || null,
                available: form.available,
                npc_price: parseInt(form.npc_price) || 0,
            };
            if (item) await db.from('items').update(payload).eq('id', item.id);
            else await db.from('items').insert(payload);
            await onSave();
            setLoad(false);
            onClose();
        };



        return (
            <div style={{
                position: 'fixed',
                inset: 0,
                zIndex: 90,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                padding: '16px'
            }}>
                <div
                    style={{position: 'absolute', inset: 0, background: 'rgba(0,0,0,.75)', backdropFilter: 'blur(6px)'}}
                    onClick={onClose}/>
                <div className="animate-fade-in relative w-full max-w-md rounded-2xl border border-slate-700 p-6"
                     style={{background: '#0f172a'}}>
                    <div className="flex items-center justify-between mb-6">
                        <h2 className="font-bold text-lg">{item ? 'Editar Item' : 'Novo Item'}</h2>
                        <button onClick={onClose} className="text-slate-500 hover:text-white transition-colors">✕
                        </button>
                    </div>
                    <div className="space-y-3">
                        <Input label="Nome *"
                               placeholder="Ex: AK-47"
                               value={form.name}
                               onChange={e => set('name', e.target.value)}/>
                        <div className="grid grid-cols-2 gap-3">
                            <Input label="Preço (Cashs) *" type="number"
                                   placeholder="1000"
                                   value={form.price}
                                   onChange={e => set('price', e.target.value)}/>
                            <Input label="Estoque"
                                   type="number"
                                   placeholder="0"
                                   value={form.stock}
                                   onChange={e => set('stock', e.target.value)}/>
                            <Input
                                label="Preço NPC (referência interna)"
                                type="number"
                                placeholder="1000"
                                value={form.npc_price}
                                onChange={e => set('npc_price', e.target.value)}
                            />
                        </div>
                        <div>
                            <label className="block text-xs text-slate-400 mb-1">Categoria *</label>
                            <select value={form.category_id} onChange={e => set('category_id', e.target.value)}
                                    className="w-full px-3 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-sm text-white focus:outline-none focus:border-violet-500 transition-colors">
                                <option value="">Selecione...</option>
                                {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs text-slate-400 mb-1">Descrição</label>
                            <textarea value={form.description} onChange={e => set('description', e.target.value)}
                                      rows={2} placeholder="Descrição do item..."
                                      className="w-full px-3 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:border-violet-500 transition-colors resize-none"/>
                        </div>

                        {/* <Input
                            label="URL da Imagem (opcional)"
                            type="url" placeholder="https://..."
                            value={form.image_url}
                            onChange={e => set('image_url', e.target.value)}
                        />
                        */}

                        <div>
                            <label className="block text-xs text-slate-400 mb-2">
                                Imagem do Item
                            </label>

                            <label
                                className="
                                    flex flex-col items-center justify-center
                                    w-full h-32
                                    border-2 border-dashed border-slate-700
                                    rounded-2xl
                                    cursor-pointer
                                    bg-slate-800/50
                                    hover:bg-slate-800
                                    hover:border-violet-500/50
                                    transition-all
                                    group"
                            >
                                <div className="flex flex-col items-center justify-center text-center">
                                <span className="text-3xl mb-2 group-hover:scale-110 transition-transform"> 📸 </span>

                                    <p className="text-sm font-medium text-slate-300">
                                        Clique para enviar imagem
                                    </p>

                                    <p className="text-xs text-slate-500 mt-1">
                                        PNG, JPG, WEBP
                                    </p>
                                </div>

                                <input
                                    type="file"
                                    accept="image/*"
                                    onChange={e => {
                                        const file = e.target.files[0];
                                        if (!file) return;
                                        setImageFile(file);
                                        set('image_url', URL.createObjectURL(file));
                                    }}
                                    className="hidden"
                                />
                            </label>

                            {form.image_url && (
                                <div className="mt-4 relative">
                                    <img
                                        src={form.image_url}
                                        alt="Preview"
                                        className="
                                            w-full h-48 object-cover
                                            rounded-2xl
                                            border border-slate-700"
                                    />

                                    <div
                                        className="
                                            absolute top-2 right-2
                                            px-2 py-1 rounded-lg
                                            text-xs font-medium
                                            bg-emerald-500/90 text-white
                                            backdrop-blur"
                                    >
                                        ✓ Upload concluído
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex items-center gap-3 pt-1">
                            <button onClick={() => set('available', !form.available)}
                                    className="relative w-11 h-6 rounded-full transition-colors flex-shrink-0"
                                    style={{background: form.available ? '#8b5cf6' : '#334155'}}>
                                <span className="absolute top-1 w-4 h-4 bg-white rounded-full transition-all"
                                      style={{left: form.available ? '24px' : '4px'}}/>
                            </button>
                            <span className="text-sm text-slate-400">Visível no catálogo</span>
                        </div>
                        {err && <p className="text-red-400 text-xs">{err}</p>}
                        <div className="flex gap-3 pt-1">
                            <button onClick={onClose}
                                    className="flex-1 py-2.5 rounded-xl text-sm bg-slate-800 border border-slate-700 hover:bg-slate-700 transition-colors">Cancelar
                            </button>
                            <button onClick={save} disabled={load}
                                    className="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-opacity hover:opacity-90 disabled:opacity-40"
                                    style={{background: 'linear-gradient(135deg,#8b5cf6,#d946ef)'}}>
                                {load ? 'Salvando...' : 'Salvar'}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

                                                    className="px-2.5 py-1.5 text-xs rounded-lg bg-slate-800 hover:bg-red-500/20 text-slate-500 hover:text-red-400 transition-all"
                                                    title="Remover">
                                                🗑
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            );
                        })}
                        </tbody>
                    </table>
                </div>

                {showAdd && <ItemFormModal categories={categories} onClose={() => setShowAdd(false)} onSave={onRefresh}/>}
                {editItem && <ItemFormModal item={editItem} categories={categories} onClose={() => setEditItem(null)} onSave={onRefresh}/>}
            </div>
        );
    }

    // ─── AdminPanel ────────────────────────────────────────────────────────
    function AdminPanel({onLogout}) {
        const [tab, setTab] = useState('orders');
        const [orders, setOrders] = useState([]);
        const [items, setItems] = useState([]);
        const [cats, setCats] = useState([]);
        const [load, setLoad] = useState(true);
        const [badge, setBadge] = useState(0);

        const loadItems = async () => {
            const { data } = await db
                .from('items')
                .select('*,categories(name,slug)')
                .order('name');

            setItems(data || []);
        };

        const loadAll = async () => {
            setLoad(true);
            const [{data: ords}, {data: its}, {data: cs}] = await Promise.all([
                db.from('orders').select('*').order('created_at', {ascending: false}),
                db.from('items').select('*,categories(name,slug)').order('name'),
                db.from('categories').select('*').order('name'),
            ]);
            setOrders(ords || []);
            setItems(its || []);
            setCats(cs || []);
            setLoad(false);
        };

        useEffect(() => {
            loadAll();
            const ch = db.channel('admin-rt')
                .on('postgres_changes', {event: 'INSERT', schema: 'public', table: 'orders'}, p => {
                    setOrders(prev => [p.new, ...prev]);
                    setBadge(b => b + 1);
                })
                .on('postgres_changes', {event: 'UPDATE', schema: 'public', table: 'orders'}, p => {
                    setOrders(prev => prev.map(o => o.id === p.new.id ? p.new : o));
                })
                .subscribe();
            return () => db.removeChannel(ch);
        }, []);

        const pending = orders.filter(o => o.status === 'pending').length;

        return (
            <div style={{minHeight: '100vh', background: '#020817'}}>
                <nav style={{
                    background: 'rgba(15,23,42,.95)',
                    borderBottom: '1px solid rgba(51,65,85,.5)',
                    position: 'sticky',
                    top: 0,
                    zIndex: 40
                }}>
                    <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-xl flex items-center justify-center font-bold text-sm"
                                 style={{background: 'linear-gradient(135deg,#8b5cf6,#d946ef)'}}>SC
                            </div>
                            <span className="font-bold">SCUM Supply Co.</span>
                            <span
                                className="text-xs text-violet-400 bg-violet-400/10 px-2 py-0.5 rounded-full border border-violet-400/20">Admin</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <a href="#" onClick={e => {
                                e.preventDefault();
                                window.location.hash = '';
                                window.location.reload();
                            }} className="text-xs text-slate-500 hover:text-slate-300 transition-colors">Ver catálogo
                                →</a>
                            <button onClick={onLogout}
                                    className="text-xs text-slate-600 hover:text-red-400 transition-colors">Sair
                            </button>
                        </div>
                    </div>
                </nav>

                <div className="max-w-7xl mx-auto px-6 py-8">
                    {/* Stats */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                        {[
                            {l: 'Total de Pedidos', v: orders.length, c: 'text-violet-400'},
                            {l: 'Pendentes', v: pending, c: 'text-yellow-400'},
                            {
                                l: 'Entregues',
                                v: orders.filter(o => o.status === 'delivered').length,
                                c: 'text-emerald-400'
                            },
                            {l: 'Itens no Estoque', v: items.length, c: 'text-blue-400'},
                        ].map(({l, v, c}) => (
                            <div key={l} className="p-4 rounded-2xl border border-slate-800 bg-slate-900/50">
                                <p className="text-xs text-slate-500 mb-1">{l}</p>
                                <p className={`text-3xl font-bold ${c}`}>{v}</p>
                            </div>
                        ))}
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-2 mb-6 border-b border-slate-800 pb-4">
                        {[{id: 'orders', l: '📋 Pedidos'}, {id: 'items', l: '📦 Estoque'}].map(t => (
                            <button key={t.id} onClick={() => {
                                setTab(t.id);
                                if (t.id === 'orders') setBadge(0);
                            }}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all ${tab === t.id ? 'text-violet-300 border border-violet-500/30' : 'text-slate-400 hover:text-white'}`}
                                    style={tab === t.id ? {background: 'rgba(139,92,246,.1)'} : {}}>
                                {t.l}
                                {t.id === 'orders' && pending > 0 && <span
                                    className="bg-yellow-500 text-white text-xs px-1.5 py-0.5 rounded-full">{pending}</span>}
                                {t.id === 'orders' && badge > 0 && <span
                                    className="bg-emerald-500 text-white text-xs px-1.5 py-0.5 rounded-full animate-pulse">+{badge}</span>}
                            </button>
                        ))}
                    </div>

                    {load
                        ? <div className="text-center py-20 text-slate-600"><p
                            className="text-4xl mb-3 animate-pulse">⚙️</p>Carregando...</div>
                        : tab === 'orders'
                            ? <OrdersTab orders={orders} setOrders={setOrders} reloadItems={loadAll}/>
                            : <ItemsTab items={items} categories={cats} onRefresh={loadAll}/>
                    }
                </div>
            </div>
        );
    }

    //  App (Catalog)
    function App() {
        const [view, setView] = useState('catalog');
        const [cats, setCats] = useState([]);
        const [items, setItems] = useState([]);
        const [selCat, setSelCat] = useState(null);
        const [cart, setCart] = useState([]);
        const [showCart, setShowCart] = useState(false);
        const [showCO, setShowCO] = useState(false);
        const [success, setSuccess] = useState(null);
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);

        // Auth
        useEffect(() => {
            db.auth.getSession().then(({data: {session}}) => setUser(session?.user ?? null));
            const {data: {subscription}} = db.auth.onAuthStateChange((_, s) => setUser(s?.user ?? null));
            return () => subscription.unsubscribe();
        }, []);

        // Hash routing
        useEffect(() => {
            const check = () => {
                if (window.location.hash === '#/admin') setView(user ? 'admin' : 'admin-login');
                else setView('catalog');
            };
            check();
            window.addEventListener('hashchange', check);
            return () => window.removeEventListener('hashchange', check);
        }, [user]);

        // Catalog
        const loadCatalog = async () => {
            setLoading(true);

            const [{ data: cs }, { data: its }] = await Promise.all([
                db.from('categories')
                    .select('*')
                    .order('name'),

                db.from('items')
                    .select('*,categories(name,slug)')
                    .eq('available', true)
                    .order('name'),
            ]);

            setCats(cs || []);
            setItems(its || []);
            setLoading(false);
        };

        useEffect(() => {
            loadCatalog();
        }, []);

        // Cart helpers
        const addToCart = item => setCart(p => {
            const ex = p.find(c => c.item.id === item.id);
            if (ex) return ex.quantity >= item.stock ? p : p.map(c => c.item.id === item.id ? {
                ...c,
                quantity: c.quantity + 1
            } : c);
            return [...p, {item, quantity: 1}];
        });
        const removeFromCart = id => setCart(p => p.filter(c => c.item.id !== id));
        const updateQty = (id, qty) => {
            if (qty <= 0) return removeFromCart(id);
            setCart(p => p.map(c => c.item.id === id ? {...c, quantity: qty} : c));
        };
        const total = cart.reduce((s, c) => s + c.item.price * c.quantity, 0);
        const count = cart.reduce((s, c) => s + c.quantity, 0);
        const filtered = selCat ? items.filter(i => i.category_id === selCat) : items;

        if (view === 'admin-login') return <AdminLogin onLogin={() => setView('admin')}/>;
        if (view === 'admin' && user) return <AdminPanel onLogout={() => {
            db.auth.signOut();
            window.location.hash = '';
            setView('catalog');
        }}/>;

        return (
            <div style={{minHeight: '100vh'}}>
                {/* BG */}
                <div style={{position: 'fixed', inset: 0, zIndex: -1, pointerEvents: 'none'}}>
                    <div style={{
                        position: 'absolute',
                        top: 0,
                        left: '50%',
                        transform: 'translateX(-50%)',
                        width: '900px',
                        height: '600px',
                        background: 'radial-gradient(ellipse,rgba(139,92,246,.1) 0%,transparent 65%)'
                    }}/>
                    <div style={{
                        position: 'absolute',
                        inset: 0,
                        backgroundImage: 'linear-gradient(rgba(139,92,246,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.025) 1px,transparent 1px)',
                        backgroundSize: '64px 64px'
                    }}/>
                </div>

                {/* Nav */}
                <nav style={{
                    position: 'fixed',
                    top: 0,
                    width: '100%',
                    zIndex: 50,
                    background: 'rgba(2,8,23,.88)',
                    backdropFilter: 'blur(20px)',
                    borderBottom: '1px solid rgba(51,65,85,.4)'
                }}>
                    <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl flex items-center justify-center font-black text-sm"
                                 style={{background: 'linear-gradient(135deg,#8b5cf6,#d946ef)'}}>SC
                            </div>
                            <div className="hidden sm:block">
                                <p className="font-bold leading-tight">SCUM Supply Co.</p>
                                <p className="text-xs text-slate-600 leading-tight">Seu Fornecedor Oficial na Ilha dos Patos</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <a href="#/admin"
                               className="text-xs text-slate-800 hover:text-slate-600 transition-colors">•</a>
                            <button onClick={() => setShowCart(true)}
                                    className="relative flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium transition-all"
                                    style={{
                                        background: 'rgba(139,92,246,.12)',
                                        border: '1px solid rgba(139,92,246,.25)',
                                        color: '#c4b5fd'
                                    }}>
                                🛒 <span className="hidden sm:inline">Carrinho</span>
                                {count > 0 && <span style={{
                                    position: 'absolute',
                                    top: '-8px',
                                    right: '-8px',
                                    width: '22px',
                                    height: '22px',
                                    background: '#8b5cf6',
                                    borderRadius: '50%',
                                    fontSize: '11px',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontWeight: 'bold'
                                }}>{count}</span>}
                            </button>
                        </div>
                    </div>
                </nav>

                {/* Hero */}
                <section className="pt-28 pb-10 px-6 text-center">
                    <div className="max-w-3xl mx-auto">
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm mb-6" style={{
                            background: 'rgba(139,92,246,.08)',
                            border: '1px solid rgba(139,92,246,.2)',
                            color: '#c4b5fd'
                        }}>
                            <span className="animate-pulse" style={{
                                width: '8px',
                                height: '8px',
                                background: '#34d399',
                                borderRadius: '50%',
                                display: 'inline-block'
                            }}/>
                            Estoque ativo · Entregas com segurança
                        </div>
                        <h1 className="text-4xl md:text-6xl font-black tracking-tight mb-4 leading-[1.1]">
                            Suprimentos de
                            <span className="block" style={{
                                background: 'linear-gradient(90deg,#a78bfa,#e879f9,#fb7185)',
                                WebkitBackgroundClip: 'text',
                                WebkitTextFillColor: 'transparent'
                            }}>
                  alta confiabilidade
                </span>
                        </h1>
                        <p className="text-slate-400 max-w-lg mx-auto text-sm leading-relaxed">
                            Armas, munição, medicamentos e recursos — entregues com discrição e máxima segurança
                            diretamente no seu perímetro.
                        </p>
                    </div>
                </section>

                {/* Category filter */}
                <section className="px-6 mb-8">
                    <div className="max-w-6xl mx-auto flex gap-2 flex-wrap justify-center">
                        <button onClick={() => setSelCat(null)}
                                className="px-4 py-2 rounded-xl text-sm font-medium transition-all" style={!selCat ? {
                            background: '#8b5cf6',
                            color: 'white'
                        } : {background: 'rgba(30,41,59,.8)', color: '#94a3b8'}}>Todos
                        </button>
                        {cats.map(c => (
                            <button key={c.id} onClick={() => setSelCat(selCat === c.id ? null : c.id)}
                                    className="px-4 py-2 rounded-xl text-sm font-medium transition-all"
                                    style={selCat === c.id ? {
                                        background: '#8b5cf6',
                                        color: 'white'
                                    } : {background: 'rgba(30,41,59,.8)', color: '#94a3b8'}}>{c.name}</button>
                        ))}
                    </div>
                </section>

                {/* Items grid */}
                <section className="px-6 pb-24">
                    <div className="max-w-6xl mx-auto">
                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-24 text-slate-600">
                                <span className="text-5xl mb-4 animate-pulse">📦</span>
                                <p>Carregando estoque...</p>
                            </div>
                        ) : filtered.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-24 text-slate-600">
                                <span className="text-5xl mb-4">🔍</span>
                                <p>Nenhum item disponível nesta categoria.</p>
                            </div>
                        ) : (
                            <div className="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {filtered.map(item => (
                                    <ItemCard key={item.id} item={item} onAdd={addToCart}
                                              cartItem={cart.find(c => c.item.id === item.id)}/>
                                ))}
                            </div>
                        )}
                    </div>
                </section>

                {/* Footer */}
                <footer className="py-8 px-6 border-t border-slate-800/50 text-center">
                    <p className="text-xs text-slate-800">© SCUM Supply Co. · Servidor Ilha dos Patos · Todos os
                        direitos reservados.</p>
                </footer>

                {/* Overlays */}
                {showCart &&
                    <CartDrawer cart={cart} total={total} onClose={() => setShowCart(false)} onRemove={removeFromCart}
                                onQty={updateQty} onCheckout={() => {
                        setShowCart(false);
                        setShowCO(true);
                    }}/>}
                {showCO && (
                    <CheckoutModal
                        cart={cart}
                        total={total}
                        reloadCatalog={loadCatalog}
                        onClose={() => setShowCO(false)}
                        onSuccess={o => {
                            setSuccess(o);
                            setShowCO(false);
                            setCart([]);
                        }}
                    />
                )}
                {success && <OrderSuccessModal order={success} onClose={() => setSuccess(null)}/>}
            </div>
        );
    }

    ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
